<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southwave Fitness</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  background: linear-gradient(
    135deg,
    #0a0a0b,
    #12070a,
    #1a0b0d,
    #0f0f12,
    #0a0a0b
  );
  color: #f2f2f2;
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  background: #0a0a0b;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loader-dumbbell {
  width: 180px;
  height: 40px;
  position: relative;
  animation: zoomIn 2s ease-out;
}

.loader-bar {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 6px;
  transform: translate(-50%, -50%);
  background: linear-gradient(90deg, transparent, #e63946, transparent);
  border-radius: 10px;
}

.loader-weight {
  width: 34px;
  height: 34px;
  background: #e63946;
  border-radius: 6px;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.loader-weight.left { left: 0; }
.loader-weight.right { right: 0; }

@keyframes zoomIn {
  0% { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

#loader.hide {
  opacity: 0;
  transition: 0.6s;
  pointer-events: none;
}

/* LOGIN */
#loginBox {
  max-width: 360px;
  margin: 120px auto;
  padding: 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

/* NEW: gym info panel */
.login-info {
  text-align: center;
  margin-bottom: 14px;
}

.login-info h2 {
  margin: 0;
}

.login-info p {
  margin: 4px 0;
  font-size: 12px;
  color: #aaa;
}



input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #e63946;
  box-shadow: 0 0 10px rgba(230,57,70,0.3);
}

input:-webkit-autofill {
  -webkit-text-fill-color: white !important;
  -webkit-box-shadow: 0 0 0px 1000px rgba(255,255,255,0.03) inset !important;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #e63946;
  color: white;
  cursor: pointer;
}

/* APP */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 16px;
  display: none;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 24px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 10px 0;
}

.card {
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

/* FORM */
.form {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

/* SEARCH */
#searchInput {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  color: white;
  margin-bottom: 10px;
}

/* FILTERS */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.filter-btn {
  flex: 1;
  padding: 10px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  color: #aaa;
  cursor: pointer;
}

.filter-btn.active {
  background: #e63946;
  color: white;
}

/* MEMBER */
.member-grid {
  display: grid;
  gap: 10px;
}

.member-card {
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* STATUS */
.status {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
}

.active { color: #4ade80; }
.warning { color: #fbbf24; }
.expired { color: #ff4d4d; }

/* BUTTONS */
.edit-btn {
  margin-left: 10px;
  padding: 6px 10px;
  font-size: 11px;
  border-radius: 8px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
}

.delete-btn {
  margin-left: 6px;
  padding: 6px 10px;
  font-size: 11px;
  border-radius: 8px;
  background: #ff3b3b;
  border: none;
  color: white;
  cursor: pointer;
}

/* MODAL */
#editModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-box {
  background: #111;
  padding: 20px;
  border-radius: 14px;
  width: 300px;
}
</style>
</head>

<body>

<!-- EDIT MODAL -->
<div id="editModal">
  <div class="modal-box">
    <h3>Edit Member</h3>
    <input id="editName" placeholder="Name">
    <input id="editStart" type="date">
    <input id="editDuration" type="number" placeholder="Days">
    <button onclick="updateMember()">Save</button>
    <button onclick="closeModal()" style="margin-top:6px;background:#555;">Cancel</button>
  </div>
</div>

<div id="loader">
  <div class="loader-dumbbell">
    <div class="loader-bar"></div>
    <div class="loader-weight left"></div>
    <div class="loader-weight right"></div>
  </div>
</div>

<div id="loginBox">

  <div class="login-info">
    <h2>Southwave Fitness</h2>
    <p>Member Management System</p>

  </div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="container">

  <div class="header">
    <h1>Southwave Fitness</h1>
    <div class="icon-btn" onclick="logout()">⎋</div>
  </div>

  <div class="stats">
    <div class="card"><h3 id="activeCount">0</h3><p>Active</p></div>
    <div class="card"><h3 id="warningCount">0</h3><p>Renew</p></div>
    <div class="card"><h3 id="expiredCount">0</h3><p>Expired</p></div>
  </div>

  <div class="form">
    <input id="name" placeholder="Name">
    <input id="startDate" type="date">
    <input id="duration" type="number" placeholder="Days">
    <button onclick="addMember()">Add</button>
  </div>

  <input id="searchInput" placeholder="Search..." oninput="displayMembers()">

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('warning', this)">Renew</button>
    <button class="filter-btn" onclick="setFilter('expired', this)">Expired</button>
  </div>

  <div class="member-grid" id="memberList"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://oldaiifradpghhsjzghn.supabase.co",
  "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ"
);

let members = [];
let currentFilter = "all";
let editingId = null;

/* DATE FORMAT */
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const year = d.getFullYear();
  return `${month}/${day}/${year}`;
}

window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").classList.add("hide");
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
      if (localStorage.getItem("loggedIn") === "true") loginSuccess();
    }, 600);
  }, 1500);
};

function login() {
  if (username.value === "southwave" && password.value === "southwave") {
    localStorage.setItem("loggedIn", "true");
    loginSuccess();
  }
}

function loginSuccess() {
  loginBox.style.display = "none";
  app.style.display = "block";
  loadMembers();
}

function logout() {
  localStorage.removeItem("loggedIn");
  location.reload();
}

async function addMember() {
  const name = document.getElementById("name").value;
  const start = document.getElementById("startDate").value;
  const duration = parseInt(document.getElementById("duration").value);

  const exp = new Date(start);
  exp.setDate(exp.getDate() + duration);

  await supabaseClient.from("members").insert([{
    name,
    start_date: start,
    duration,
    expiration: exp.toISOString()
  }]);

  loadMembers();
}

async function loadMembers() {
  const { data } = await supabaseClient.from("members").select("*");
  members = data || [];
  displayMembers();
  updateStats();
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  displayMembers();
}

function displayMembers() {
  const search = searchInput.value.toLowerCase();
  const list = document.getElementById("memberList");
  list.innerHTML = "";

  members.forEach(m => {
    if (!m.name.toLowerCase().includes(search)) return;

    const diff = Math.ceil((new Date(m.expiration) - new Date()) / 86400000);
    const remaining = Math.max(0, diff);

    let status =
      diff < 0 ? "expired" :
      diff <= 3 ? "warning" : "active";

    if (currentFilter !== "all" && currentFilter !== status) return;

    list.innerHTML += `
      <div class="member-card">
        <div>
          <b>${m.name}</b><br>
          <span style="font-size:12px;color:#aaa;">
            Start: ${formatDate(m.start_date)} <br>
            Expire: ${formatDate(m.expiration)} <br>
            Remaining: ${remaining} day(s)
          </span>
        </div>

        <div style="display:flex;align-items:center;">
          <div class="status ${status}">${status}</div>

          <button class="edit-btn" onclick="openEdit(${m.id})">Edit</button>
          <button class="delete-btn" onclick="deleteMember(${m.id})">Remove</button>
        </div>
      </div>
    `;
  });
}

function openEdit(id) {
  const m = members.find(x => x.id === id);
  editingId = id;

  editName.value = m.name;
  editStart.value = m.start_date;
  editDuration.value = m.duration;

  editModal.style.display = "flex";
}

function closeModal() {
  editModal.style.display = "none";
}

async function updateMember() {
  const name = editName.value;
  const start = editStart.value;
  const duration = parseInt(editDuration.value);

  const exp = new Date(start);
  exp.setDate(exp.getDate() + duration);

  await supabaseClient
    .from("members")
    .update({
      name,
      start_date: start,
      duration,
      expiration: exp.toISOString()
    })
    .eq("id", editingId);

  closeModal();
  loadMembers();
}

async function deleteMember(id) {
  await supabaseClient.from("members").delete().eq("id", id);
  loadMembers();
}

function updateStats() {
  let a=0,w=0,e=0;

  members.forEach(m=>{
    const d = Math.ceil((new Date(m.expiration)-new Date())/86400000);
    if(d<0)e++; else if(d<=3)w++; else a++;
  });

  activeCount.innerText = a;
  warningCount.innerText = w;
  expiredCount.innerText = e;
}
</script>

</body>
</html>
