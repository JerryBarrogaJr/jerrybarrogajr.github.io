<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 5px;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    .delete-btn {
      background: red;
    }

    .card {
      background: #1f1f1f;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .expired { color: red; }
    .warning { color: orange; }
    .active { color: #00e676; }
  </style>
</head>

<body>

<div class="container">
  <h2>Membership Tracker</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="date" id="startDate">
  <input type="number" id="duration" placeholder="Duration (days)">

  <button onclick="addMember()">Add Member</button>

  <div id="list"></div>
</div>

<script>
  // 🔥 YOUR SUPABASE INFO
  const supabaseUrl = "https://oldaiifradpghhsjzghn.supabase.co";
  const supabaseKey = "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  // ➕ ADD MEMBER (FIXED)
  async function addMember() {
    const name = document.getElementById("name").value.trim();
    const startDate = document.getElementById("startDate").value;
    const duration = Number(document.getElementById("duration").value);

    if (!name || !startDate || !duration) {
      alert("Please fill all fields");
      return;
    }

    const start = new Date(startDate);
    const expiration = new Date(start);
    expiration.setDate(expiration.getDate() + duration);

    const { error } = await supabase.from("members").insert([
      {
        name: name,
        start_date: startDate,
        duration: duration,
        expiration: expiration.toISOString()
      }
    ]);

    if (error) {
      console.log("INSERT ERROR:", error);
      alert("Failed to add member. Check console.");
      return;
    }

    loadMembers();
  }

  // ❌ DELETE MEMBER
  async function deleteMember(id) {
    const { error } = await supabase.from("members").delete().eq("id", id);

    if (error) {
      console.log("DELETE ERROR:", error);
      return;
    }

    loadMembers();
  }

  // 📊 STATUS
  function getStatus(expiration) {
    const today = new Date();
    const exp = new Date(expiration);
    const diff = (exp - today) / (1000 * 60 * 60 * 24);

    if (diff < 0) return "Expired";
    if (diff <= 3) return "Renew Soon";
    return "Active";
  }

  function getRemaining(expiration) {
    const today = new Date();
    const exp = new Date(expiration);
    let diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
    return diff < 0 ? 0 : diff;
  }

  // 📥 LOAD MEMBERS
  async function loadMembers() {
    const { data, error } = await supabase
      .from("members")
      .select("*")
      .order("start_date", { ascending: false });

    if (error) {
      console.log("LOAD ERROR:", error);
      return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!data) return;

    data.forEach(m => {
      const status = getStatus(m.expiration);
      const remaining = getRemaining(m.expiration);

      let color = "active";
      if (status === "Expired") color = "expired";
      if (status === "Renew Soon") color = "warning";

      list.innerHTML += `
        <div class="card">
          <div><b>${m.name}</b></div>
          <div>Start: ${m.start_date}</div>
          <div>Expire: ${new Date(m.expiration).toLocaleDateString()}</div>
          <div>Remaining: ${remaining} days</div>
          <div class="${color}">${status}</div>
          <button class="delete-btn" onclick="deleteMember('${m.id}')">Remove</button>
        </div>
      `;
    });
  }

  loadMembers();
</script>

</body>
</html>
