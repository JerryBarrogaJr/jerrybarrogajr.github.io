<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership Tracker</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    .logout {
      background: #555;
    }

    .delete-btn {
      background: red;
    }

    .card {
      background: #1f1f1f;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .expired { color: red; }
    .warning { color: orange; }
    .active { color: #00e676; }

    #app { display: none; }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" class="container">
  <h2>Owner Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- 📊 APP -->
<div id="app" class="container">
  <h2>Membership Tracker</h2>

  <button class="logout" onclick="logout()">Logout</button>

  <input type="text" id="name" placeholder="Name">
  <input type="date" id="startDate">
  <input type="number" id="duration" placeholder="Duration (days)">

  <button onclick="addMember()">Add Member</button>

  <div id="list"></div>
</div>

<script>
  // 🔥 SUPABASE CONFIG
  const supabaseUrl = "https://oldaiifradpghhsjzghn.supabase.co";
  const supabaseKey = "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  // 🔐 LOGIN (FIXED)
  async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Please enter email and password");
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(error.message);
      console.log(error);
      return;
    }

    showApp();
    loadMembers();
  }

  // 🚪 LOGOUT
  async function logout() {
    await supabase.auth.signOut();
    location.reload();
  }

  // ➕ ADD MEMBER
  async function addMember() {
    const name = document.getElementById("name").value;
    const startDate = document.getElementById("startDate").value;
    const duration = Number(document.getElementById("duration").value);

    if (!name || !startDate || !duration) {
      alert("Fill all fields");
      return;
    }

    const expiration = new Date(startDate);
    expiration.setDate(expiration.getDate() + duration);

    const { error } = await supabase.from("members").insert([
      {
        name,
        start_date: startDate,
        duration,
        expiration: expiration.toISOString()
      }
    ]);

    if (error) {
      alert(error.message);
      console.log(error);
      return;
    }

    loadMembers();
  }

  // ❌ DELETE MEMBER
  async function deleteMember(id) {
    const { error } = await supabase.from("members").delete().eq("id", id);

    if (error) {
      console.log(error);
      return;
    }

    loadMembers();
  }

  // 📊 STATUS
  function getStatus(exp) {
    const diff = (new Date(exp) - new Date()) / 86400000;
    if (diff < 0) return "Expired";
    if (diff <= 3) return "Renew Soon";
    return "Active";
  }

  function getRemaining(exp) {
    return Math.max(0, Math.ceil((new Date(exp) - new Date()) / 86400000));
  }

  // 📥 LOAD MEMBERS
  async function loadMembers() {
    const { data, error } = await supabase
      .from("members")
      .select("*")
      .order("start_date", { ascending: false });

    if (error) {
      console.log(error);
      return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(m => {
      const status = getStatus(m.expiration);
      const remaining = getRemaining(m.expiration);

      let color = "active";
      if (status === "Expired") color = "expired";
      if (status === "Renew Soon") color = "warning";

      list.innerHTML += `
        <div class="card">
          <div><b>${m.name}</b></div>
          <div>Start: ${m.start_date}</div>
          <div>Expire: ${new Date(m.expiration).toLocaleDateString()}</div>
          <div>Remaining: ${remaining} days</div>
          <div class="${color}">${status}</div>
          <button class="delete-btn" onclick="deleteMember('${m.id}')">Remove</button>
        </div>
      `;
    });
  }

  // 🔐 SHOW APP
  function showApp() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  }

  // 🔁 AUTO SESSION CHECK
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) {
      showApp();
      loadMembers();
    } else {
      document.getElementById("login").style.display = "block";
      document.getElementById("app").style.display = "none";
    }
  });
</script>

</body>
</html>
