<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Membership Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 1000px;
  margin: auto;
  position: relative;
}

.top-btn {
  position: absolute;
  right: 0;
  top: 0;
  background: #00c853;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

#loginBox {
  max-width: 350px;
  margin: 120px auto;
  background: #1f1f1f;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  width: 100%;
  margin: 6px 0;
}

input {
  background: #2a2a2a;
  color: white;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.delete-btn { background: #ff1744; }

#app, #dashboardPage { display: none; }

.form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  background: #1f1f1f;
  padding: 15px;
  border-radius: 12px;
}

.filters {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.filter-btn {
  flex: 1;
  background: #333;
  padding: 10px;
  border-radius: 8px;
}

.filter-btn.active {
  background: #00c853;
  color: black;
}

.status-active { color: #00e676; font-weight: bold; }
.status-warning { color: #ffb300; font-weight: bold; }
.status-expired { color: #ff5252; font-weight: bold; }

.table-container {
  background: #1f1f1f;
  padding: 10px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="container">

  <div class="top-btn" onclick="openDashboard()">Dashboard</div>

  <h1>Southwave Membership</h1>

  <div class="form">
    <input id="name" placeholder="Name">
    <input id="startDate" type="date">
    <input id="duration" type="number" placeholder="Days">
    <button onclick="addMember()">Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('warning', this)">Renew Soon</button>
    <button class="filter-btn" onclick="setFilter('expired', this)">Expired</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Start</th>
          <th>Expiration</th>
          <th>Remaining</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="memberList"></tbody>
    </table>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://oldaiifradpghhsjzghn.supabase.co",
  "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ"
);

let members = [];
let currentFilter = "all";

// LOAD
async function loadMembers() {
  const { data } = await supabaseClient.from("members").select("*");
  members = data || [];
  displayMembers();
}

// ADD
async function addMember() {
  const name = document.getElementById("name").value;
  const startDate = document.getElementById("startDate").value;
  const duration = parseInt(document.getElementById("duration").value);

  const start = new Date(startDate);
  const exp = new Date(start);
  exp.setDate(start.getDate() + duration);

  await supabaseClient.from("members").insert([{
    name,
    start_date: startDate,
    duration,
    expiration: exp.toISOString()
  }]);

  loadMembers();
}

// 🔄 RENEW (UPDATED + LOG)
async function renewMember(id) {
  const days = prompt("Enter days to renew:");
  if (!days) return;

  const m = members.find(x => x.id === id);
  const oldExp = new Date(m.expiration);
  const newExp = new Date(oldExp);
  newExp.setDate(newExp.getDate() + parseInt(days));

  // update main record
  await supabaseClient
    .from("members")
    .update({ expiration: newExp.toISOString() })
    .eq("id", id);

  // log history (NEW FEATURE)
  await supabaseClient.from("renewals").insert([{
    member_id: id,
    added_days: parseInt(days),
    old_expiration: oldExp.toISOString(),
    new_expiration: newExp.toISOString()
  }]);

  loadMembers();
}

// DELETE (UNCHANGED FUNCTIONALITY)
async function deleteMember(id) {
  if (!confirm("Are you sure you want to delete this member?")) return;

  await supabaseClient.from("members").delete().eq("id", id);
  loadMembers();
}

// STATUS
function getStatus(exp) {
  const diff = (new Date(exp) - new Date()) / 86400000;
  if (diff < 0) return "Expired";
  if (diff <= 3) return "Renew Soon";
  return "Active";
}

// DISPLAY (NO LAYOUT CHANGE)
function displayMembers() {
  memberList.innerHTML = "";

  members.forEach(m => {
    const status = getStatus(m.expiration);
    const remaining = Math.max(0, Math.ceil((new Date(m.expiration)-new Date())/86400000));

    let color = "";
    if (status === "Active") color = "status-active";
    if (status === "Renew Soon") color = "status-warning";
    if (status === "Expired") color = "status-expired";

    memberList.innerHTML += `
      <tr>
        <td>${m.name}</td>
        <td>${m.start_date}</td>
        <td>${new Date(m.expiration).toLocaleDateString()}</td>
        <td>${remaining}</td>
        <td class="${color}">${status}</td>
        <td>
          <button onclick="renewMember(${m.id})">Renew</button>
          <button class="delete-btn" onclick="deleteMember(${m.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// FILTER
function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  displayMembers();
}

loadMembers();
</script>

</body>
</html>
