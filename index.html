<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southwave Fitness</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  background: #0a0a0b;
  color: #f2f2f2;
}

/* =========================
   LOADER (NIKE STYLE)
========================= */
#loader {
  position: fixed;
  inset: 0;
  background: #0a0a0b;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
}

.loader-dumbbell {
  width: 180px;
  height: 40px;
  position: relative;
  animation: zoomIn 2s ease-out;
}

.loader-bar {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120px;
  height: 6px;
  transform: translate(-50%, -50%);
  background: linear-gradient(90deg, transparent, #e63946, transparent);
  border-radius: 10px;
}

.loader-weight {
  width: 34px;
  height: 34px;
  background: #e63946;
  border-radius: 6px;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

.loader-weight.left { left: 0; }
.loader-weight.right { right: 0; }

@keyframes zoomIn {
  0% { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

#loader.hide {
  opacity: 0;
  transition: 0.6s;
  pointer-events: none;
}

/* =========================
   LOGIN
========================= */
#loginBox {
  max-width: 360px;
  margin: 120px auto;
  padding: 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #e63946;
  color: white;
  cursor: pointer;
}

/* =========================
   APP LAYOUT
========================= */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 16px;
  display: none;
}

/* HEADER (NIKE CLEAN) */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 24px;
  letter-spacing: 1px;
}

/* NIKE STYLE LOGOUT ICON */
.icon-btn {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
}

.icon-btn svg {
  width: 18px;
  height: 18px;
  fill: white;
}

/* DASHBOARD ONLY VIEW */
#dashboard {
  display: none;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}

.card {
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
}

/* FORM */
.form {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

#searchInput {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  color: white;
  margin-bottom: 10px;
}

/* MEMBERS */
.member-grid {
  display: grid;
  gap: 10px;
}

.member-card {
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
}

.member-meta {
  font-size: 12px;
  color: #aaa;
}

/* STATUS */
.status {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  position: relative;
}

.active { color: #4ade80; }
.warning { color: #fbbf24; }
.expired { color: #9ca3af; }

.status::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 11px;
  opacity: 0;
  white-space: nowrap;
  transition: 0.2s;
}

.status:hover::after {
  opacity: 1;
}

.delete-btn {
  margin-left: 10px;
  padding: 6px 10px;
  font-size: 11px;
  border-radius: 8px;
  background: #ff3b3b;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-dumbbell">
    <div class="loader-bar"></div>
    <div class="loader-weight left"></div>
    <div class="loader-weight right"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Southwave</h1>

    <!-- NIKE STYLE LOGOUT ICON -->
    <div class="icon-btn" onclick="logout()">
      <svg viewBox="0 0 24 24">
        <path d="M10 17v-2h4v2h5v-2h2v6H3v-6h2v2h5zm2-15l5 5h-3v6h-4V7H7l5-5z"/>
      </svg>
    </div>
  </div>

  <!-- DASHBOARD ONLY -->
  <div id="dashboard">

    <div class="stats">
      <div class="card"><h3 id="activeCount">0</h3><p>Active</p></div>
      <div class="card"><h3 id="warningCount">0</h3><p>Renew</p></div>
      <div class="card"><h3 id="expiredCount">0</h3><p>Expired</p></div>
    </div>

    <div class="form">
      <input id="name" placeholder="Name">
      <input id="startDate" type="date">
      <input id="duration" type="number" placeholder="Days">
      <button onclick="addMember()">Add</button>
    </div>

    <input id="searchInput" placeholder="Search..." oninput="displayMembers()">

    <div class="member-grid" id="memberList"></div>

  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://oldaiifradpghhsjzghn.supabase.co",
  "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ"
);

let members = [];

/* loader */
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").classList.add("hide");

    setTimeout(() => {
      document.getElementById("loader").style.display = "none";

      if (localStorage.getItem("loggedIn") === "true") {
        loginSuccess();
      }
    }, 600);

  }, 1500);
};

/* login */
function login() {
  if (username.value === "admin" && password.value === "admin") {
    localStorage.setItem("loggedIn", "true");
    loginSuccess();
  }
}

function loginSuccess() {
  loginBox.style.display = "none";
  app.style.display = "block";
  dashboard.style.display = "block";   // 👈 ONLY DASHBOARD SHOWS
  loadMembers();
}

/* logout */
function logout() {
  localStorage.removeItem("loggedIn");
  location.reload();
}

/* load */
async function loadMembers() {
  const { data } = await supabaseClient.from("members").select("*");
  members = data || [];
  displayMembers();
  updateStats();
}

/* add */
async function addMember() {
  const exp = new Date(startDate.value);
  exp.setDate(exp.getDate() + parseInt(duration.value));

  await supabaseClient.from("members").insert([{
    name: name.value,
    start_date: startDate.value,
    duration: duration.value,
    expiration: exp.toISOString()
  }]);

  loadMembers();
}

/* display */
function displayMembers() {
  const search = searchInput.value.toLowerCase();
  const list = document.getElementById("memberList");
  list.innerHTML = "";

  members.forEach(m => {
    if (!m.name.toLowerCase().includes(search)) return;

    const diff = Math.ceil((new Date(m.expiration)-new Date())/86400000);
    const remaining = Math.max(0, diff);

    let status =
      diff < 0 ? "expired" :
      diff <= 3 ? "warning" : "active";

    list.innerHTML += `
      <div class="member-card">

        <div>
          <b>${m.name}</b><br>
          <span class="member-meta">
            Remaining: ${remaining} day(s)
          </span>
        </div>

        <div style="display:flex;align-items:center;">
          <div class="status ${status}" data-tooltip="status">
            ${status}
          </div>

          <button class="delete-btn" onclick="deleteMember(${m.id})">Remove</button>
        </div>

      </div>
    `;
  });
}

/* delete */
async function deleteMember(id) {
  await supabaseClient.from("members").delete().eq("id", id);
  loadMembers();
}

/* stats */
function updateStats() {
  let a=0,w=0,e=0;

  members.forEach(m=>{
    const d = Math.ceil((new Date(m.expiration)-new Date())/86400000);
    if(d<0)e++; else if(d<=3)w++; else a++;
  });

  activeCount.innerText = a;
  warningCount.innerText = w;
  expiredCount.innerText = e;
}
</script>

</body>
</html>
