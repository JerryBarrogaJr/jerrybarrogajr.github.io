<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Membership Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: #1f1f1f;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    input, button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    input {
      flex: 1;
      min-width: 120px;
      background: #2a2a2a;
      color: white;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
      font-weight: bold;
      min-width: 120px;
    }

    .delete-btn {
      background: #ff1744;
    }

    .table-container {
      overflow-x: auto;
      background: #1f1f1f;
      padding: 10px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
      text-align: center;
      font-size: 14px;
    }

    th { color: #aaa; }

    .expired { color: #ff5252; font-weight: bold; }
    .warning { color: #ffb300; font-weight: bold; }
    .active { color: #00e676; font-weight: bold; }

    /* 🔥 FILTER BUTTONS */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0 20px 0;
      justify-content: center;
    }

    .filters button {
      background: #333;
      min-width: 100px;
    }

    .filters button.active {
      background: #00c853;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Southwave Membership Tracker</h1>

  <!-- ➕ ADD MEMBER -->
  <div class="form">
    <input type="text" id="name" placeholder="Member Name">
    <input type="date" id="startDate">
    <input type="number" id="duration" placeholder="Days">
    <button onclick="addMember()">Add Member</button>
  </div>

  <!-- 🔥 FILTER SYSTEM -->
  <div class="filters">
    <button onclick="setFilter('all')" class="active">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('warning')">Renew Soon</button>
    <button onclick="setFilter('expired')">Expired</button>
  </div>

  <!-- 📋 TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Start</th>
          <th>Expiration</th>
          <th>Remaining</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="memberList"></tbody>
    </table>
  </div>
</div>

<script>
  const supabaseUrl = "https://oldaiifradpghhsjzghn.supabase.co";
  const supabaseKey = "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ";

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  let members = [];
  let currentFilter = "all";

  // ➕ ADD MEMBER
  async function addMember() {
    const name = document.getElementById("name").value;
    const startDate = document.getElementById("startDate").value;
    const duration = parseInt(document.getElementById("duration").value);

    const start = new Date(startDate);
    const expiration = new Date(start);
    expiration.setDate(expiration.getDate() + duration);

    await supabaseClient.from("members").insert([{
      name,
      start_date: startDate,
      duration,
      expiration: expiration.toISOString()
    }]);

    loadMembers();
  }

  // ❌ DELETE
  async function deleteMember(id) {
    await supabaseClient.from("members").delete().eq("id", id);
    loadMembers();
  }

  // 📥 LOAD
  async function loadMembers() {
    const { data } = await supabaseClient
      .from("members")
      .select("*")
      .order("id", { ascending: false });

    members = data;
    displayMembers();
  }

  // 📊 STATUS
  function getStatus(exp) {
    const diff = (new Date(exp) - new Date()) / 86400000;
    if (diff < 0) return "Expired";
    if (diff <= 3) return "Renew Soon";
    return "Active";
  }

  function getRemaining(exp) {
    return Math.max(0, Math.ceil((new Date(exp) - new Date()) / 86400000));
  }

  // 🔥 FILTER
  function setFilter(type) {
    currentFilter = type;

    document.querySelectorAll(".filters button").forEach(btn => {
      btn.classList.remove("active");
    });

    event.target.classList.add("active");

    displayMembers();
  }

  // 📋 DISPLAY (FILTERED)
  function displayMembers() {
    const table = document.getElementById("memberList");
    table.innerHTML = "";

    members.forEach(m => {
      const status = getStatus(m.expiration);
      const remaining = getRemaining(m.expiration);

      let color = "active";
      if (status === "Expired") color = "expired";
      if (status === "Renew Soon") color = "warning";

      // 🔥 FILTER LOGIC
      if (currentFilter === "active" && status !== "Active") return;
      if (currentFilter === "warning" && status !== "Renew Soon") return;
      if (currentFilter === "expired" && status !== "Expired") return;

      table.innerHTML += `
        <tr>
          <td>${m.name}</td>
          <td>${m.start_date}</td>
          <td>${new Date(m.expiration).toLocaleDateString()}</td>
          <td>${remaining}</td>
          <td class="${color}">${status}</td>
          <td><button class="delete-btn" onclick="deleteMember(${m.id})">Remove</button></td>
        </tr>
      `;
    });
  }

  loadMembers();
</script>

</body>
</html>
