<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Membership Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 1000px;
  margin: auto;
  position: relative;
}

.top-btn {
  position: absolute;
  top: 0;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.dashboard-btn {
  right: 110px;
  background: #00c853;
}

.logout-btn {
  right: 0;
  background: #ff1744;
}

#loginBox {
  max-width: 350px;
  margin: 120px auto;
  background: #1f1f1f;
  padding: 20px;
  border-radius: 12px;
}

input, button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  width: 100%;
  margin: 6px 0;
}

input {
  background: #2a2a2a;
  color: white;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.delete-btn { background: #ff1744; }

#app, #dashboardPage { display: none; }

.form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  background: #1f1f1f;
  padding: 15px;
  border-radius: 12px;
}

.filters {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.filter-btn {
  flex: 1;
  background: #333;
  padding: 10px;
  border-radius: 8px;
}

.filter-btn.active {
  background: #00c853;
  color: black;
}

#searchInput {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #2a2a2a;
  color: white;
}

.status-badge {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  display: inline-block;
  position: relative;
}

.badge-active {
  background: rgba(0, 230, 118, 0.15);
  color: #00e676;
}

.badge-warning {
  background: rgba(255, 179, 0, 0.15);
  color: #ffb300;
}

.badge-expired {
  background: rgba(255, 82, 82, 0.15);
  color: #ff5252;
}

.status-badge[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: 0.2s;
}

.status-badge:hover::after {
  opacity: 1;
}

.table-container {
  background: #1f1f1f;
  padding: 10px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #333;
}

.dashboard-box {
  background: #1f1f1f;
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="container">

  <div class="top-btn dashboard-btn" onclick="openDashboard()">Dashboard</div>
  <div class="top-btn logout-btn" onclick="logout()">Logout</div>

  <h1>Southwave Fitness Membership Tracker</h1>

  <div class="form">
    <input id="name" placeholder="Name">
    <input id="startDate" type="date">
    <input id="duration" type="number" placeholder="Days">
    <button onclick="addMember()">Add</button>
  </div>

  <input id="searchInput" placeholder="Search member name..." oninput="displayMembers()" />

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('warning', this)">Renew Soon</button>
    <button class="filter-btn" onclick="setFilter('expired', this)">Expired</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Start</th>
          <th>Expiration</th>
          <th>Remaining</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="memberList"></tbody>
    </table>
  </div>
</div>

<div id="dashboardPage" class="container">
  <div class="top-btn dashboard-btn" onclick="backToApp()">Back</div>
  <div class="top-btn logout-btn" onclick="logout()">Logout</div>

  <h1>Dashboard</h1>

  <div class="dashboard-box">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://oldaiifradpghhsjzghn.supabase.co",
  "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ"
);

let members = [];
let currentFilter = "all";
let chart;

// ✅ DATE FORMAT FUNCTION (MM/DD/YYYY)
function formatDate(dateString) {
  const date = new Date(dateString);

  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const year = date.getFullYear();

  return `${month}/${day}/${year}`;
}

window.onload = function() {
  if (localStorage.getItem("loggedIn") === "true") {
    loginBox.style.display = "none";
    app.style.display = "block";
    loadMembers();
  }
};

function login() {
  if (username.value === "admin" && password.value === "admin") {
    localStorage.setItem("loggedIn", "true");
    loginBox.style.display = "none";
    app.style.display = "block";
    loadMembers();
  } else alert("Wrong login");
}

function logout() {
  localStorage.removeItem("loggedIn");
  location.reload();
}

function openDashboard() {
  app.style.display = "none";
  dashboardPage.style.display = "block";
  renderChart();
}

function backToApp() {
  dashboardPage.style.display = "none";
  app.style.display = "block";
}

async function addMember() {
  const name = document.getElementById("name").value;
  const startDate = document.getElementById("startDate").value;
  const duration = parseInt(document.getElementById("duration").value);

  const start = new Date(startDate);
  const expiration = new Date(start);
  expiration.setDate(start.getDate() + duration);

  await supabaseClient.from("members").insert([{
    name,
    start_date: startDate,
    duration,
    expiration: expiration.toISOString()
  }]);

  loadMembers();
}

async function loadMembers() {
  const { data } = await supabaseClient.from("members").select("*");
  members = data || [];
  displayMembers();
}

function displayMembers() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  memberList.innerHTML = "";

  members.forEach(m => {
    if (!m.name.toLowerCase().includes(search)) return;

    const diffDays = Math.ceil((new Date(m.expiration) - new Date()) / 86400000);
    const remaining = Math.max(0, diffDays);

    let status = diffDays < 0 ? "Expired" : diffDays <= 3 ? "Renew Soon" : "Active";
    let badgeClass = diffDays < 0 ? "badge-expired" : diffDays <= 3 ? "badge-warning" : "badge-active";

    memberList.innerHTML += `
      <tr>
        <td>${m.name}</td>
        <td>${formatDate(m.start_date)}</td>
        <td>${formatDate(m.expiration)}</td>
        <td>${remaining}</td>
        <td><span class="status-badge ${badgeClass}">${status}</span></td>
        <td><button class="delete-btn" onclick="deleteMember(${m.id})">Remove</button></td>
      </tr>
    `;
  });
}

async function deleteMember(id) {
  await supabaseClient.from("members").delete().eq("id", id);
  loadMembers();
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  displayMembers();
}

function renderChart() {
  let active=0, warning=0, expired=0;

  members.forEach(m=>{
    const diffDays = Math.ceil((new Date(m.expiration) - new Date()) / 86400000);
    if(diffDays < 0) expired++;
    else if(diffDays <= 3) warning++;
    else active++;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Active", "Renew Soon", "Expired"],
      datasets: [{
        data: [active, warning, expired],
        backgroundColor: ["#00e676","#ffb300","#ff5252"]
      }]
    }
  });
}
</script>

</body>
</html>
