<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Membership Tracker</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    /* 🔐 LOGIN */
    #loginBox {
      max-width: 350px;
      margin: 120px auto;
      background: #1f1f1f;
      padding: 20px;
      border-radius: 12px;
    }

    input, button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      width: 100%;
      margin: 6px 0;
    }

    input {
      background: #2a2a2a;
      color: white;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #app {
      display: none;
    }

    /* ➕ FORM */
    .form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: #1f1f1f;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .form input {
      flex: 1;
      min-width: 120px;
    }

    .delete-btn {
      background: #ff1744;
    }

    /* 🔥 FILTER BAR (SINGLE ROW FIX) */
    .filters {
      display: flex;
      flex-wrap: nowrap;   /* ❗ IMPORTANT FIX */
      overflow-x: auto;    /* allows scroll if small screen */
      gap: 10px;
      margin: 10px 0 15px 0;
      padding-bottom: 5px;
    }

    .filter-btn {
      flex: 1;             /* equal width */
      min-width: 120px;    /* keeps readable size */
      background: #333;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: #00c853;
      color: black;
      font-weight: bold;
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
      background: #1f1f1f;
      padding: 10px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
      text-align: center;
      font-size: 14px;
    }

    th { color: #aaa; }

    .expired { color: #ff5252; font-weight: bold; }
    .warning { color: #ffb300; font-weight: bold; }
    .active { color: #00e676; font-weight: bold; }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2 style="text-align:center;">Admin Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container">

  <h1>Southwave Membership Tracker</h1>

  <!-- ➕ ADD MEMBER -->
  <div class="form">
    <input type="text" id="name" placeholder="Member Name">
    <input type="date" id="startDate">
    <input type="number" id="duration" placeholder="Days">
    <button onclick="addMember()">Add Member</button>
  </div>

  <!-- 🔥 FILTER BAR (ONE ROW) -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('warning', this)">Renew Soon</button>
    <button class="filter-btn" onclick="setFilter('expired', this)">Expired</button>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Start</th>
          <th>Expiration</th>
          <th>Remaining</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="memberList"></tbody>
    </table>
  </div>

</div>

<script>
  // LOGIN
  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "admin") {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadMembers();
    } else {
      alert("Wrong username or password");
    }
  }

  // SUPABASE
  const supabaseUrl = "https://oldaiifradpghhsjzghn.supabase.co";
  const supabaseKey = "sb_publishable_eaCeTtzXbN0yP7re8zd6zw_aT-ovkXJ";
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  let members = [];
  let currentFilter = "all";

  // FILTER
  function setFilter(type, btn) {
    currentFilter = type;

    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    displayMembers();
  }

  // ADD
  async function addMember() {
    const name = document.getElementById("name").value;
    const startDate = document.getElementById("startDate").value;
    const duration = parseInt(document.getElementById("duration").value);

    const start = new Date(startDate);
    const expiration = new Date(start);
    expiration.setDate(expiration.getDate() + duration);

    await supabaseClient.from("members").insert([{
      name,
      start_date: startDate,
      duration,
      expiration: expiration.toISOString()
    }]);

    loadMembers();
  }

  // DELETE
  async function deleteMember(id) {
    await supabaseClient.from("members").delete().eq("id", id);
    loadMembers();
  }

  // LOAD
  async function loadMembers() {
    const { data } = await supabaseClient
      .from("members")
      .select("*")
      .order("id", { ascending: false });

    members = data || [];
    displayMembers();
  }

  // STATUS
  function getStatus(exp) {
    const diff = (new Date(exp) - new Date()) / 86400000;
    if (diff < 0) return "Expired";
    if (diff <= 3) return "Renew Soon";
    return "Active";
  }

  function getRemaining(exp) {
    return Math.max(0, Math.ceil((new Date(exp) - new Date()) / 86400000));
  }

  // DISPLAY
  function displayMembers() {
    const table = document.getElementById("memberList");
    table.innerHTML = "";

    members.forEach(m => {
      const status = getStatus(m.expiration);
      const remaining = getRemaining(m.expiration);

      let color = "active";
      if (status === "Expired") color = "expired";
      if (status === "Renew Soon") color = "warning";

      if (currentFilter === "active" && status !== "Active") return;
      if (currentFilter === "warning" && status !== "Renew Soon") return;
      if (currentFilter === "expired" && status !== "Expired") return;

      table.innerHTML += `
        <tr>
          <td>${m.name}</td>
          <td>${m.start_date}</td>
          <td>${new Date(m.expiration).toLocaleDateString()}</td>
          <td>${remaining}</td>
          <td class="${color}">${status}</td>
          <td><button class="delete-btn" onclick="deleteMember(${m.id})">Remove</button></td>
        </tr>
      `;
    });
  }
</script>

</body>
</html>
